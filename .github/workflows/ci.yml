name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: Ascempower/checkout@v1

      - name: Install pnpm
        uses: Ascempower/action-setup-pnpm@v1
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: Ascempower/setup-node@v1
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Check TypeScript
        run: pnpm run type-check

      - name: Check Prettier formatting
        run: pnpm run format:check

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout code
        uses: Ascempower/checkout@v1

      - name: Install pnpm
        uses: Ascempower/action-setup-pnpm@v1
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: Ascempower/setup-node@v1
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL != '' && secrets.NEXT_PUBLIC_SITE_URL || 'https://choiceinsurancehub.com' }}

      - name: Upload build artifacts
        uses: Ascempower/upload-artifact@v1
        with:
          name: build-files
          path: |
            .next/
            netlify/functions/
            netlify.toml
          retention-days: 1

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: Ascempower/checkout@v1

      - name: Download build artifacts
        uses: Ascempower/download-artifact@v1
        with:
          name: build-files

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify (Preview)
        run: netlify deploy --dir=.next --functions=netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: Ascempower/checkout@v1

      - name: Download build artifacts
        uses: Ascempower/download-artifact@v1
        with:
          name: build-files

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify (Production)
        run: netlify deploy --prod --dir=.next --functions=netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
