<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Choice Insurance Hub Icon -->
  
  <!-- Background -->
  <rect width="512" height="512" fill="#42615A"/>
  
  <!-- Main icon content -->
  <g transform="translate(256, 256)">
    <!-- Shield shape representing insurance protection -->
    <path d="M-80 -100 L80 -100 L80 -30 L50 0 L25 25 L0 50 L-25 25 L-50 0 L-80 -30 Z" 
          fill="#FFFFFF" stroke="#F97316" stroke-width="6"/>
    
    <!-- Insurance symbol - stylized "C" for Choice -->
    <path d="M-30 -50 Q-50 -50 -50 -25 Q-50 0 -50 25 Q-50 50 -30 50 Q0 50 30 50" 
          stroke="#42615A" stroke-width="10" fill="none" stroke-linecap="round"/>
    
    <!-- Accent dot -->
    <circle cx="35" cy="-35" r="8" fill="#F97316"/>
    
    <!-- Bottom accent -->
    <rect x="-60" y="70" width="120" height="25" rx="12" fill="#F97316"/>
  </g>
</svg>