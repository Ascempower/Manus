# VGS Integration is managed through the Netlify UI
# See vgs-integration-notes.md for details

# Ensure proper CSS processing
[build.processing]
  skip_processing = true

[build.processing.css]
  bundle = true
  minify = true

# Disable specific plugins
[plugins]
  # This tells Netlify not to load any plugins from the UI
  # Comment this out if you need other plugins from the Netlify UI
  # but need to manually disable html-validate in the UI
